<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Assets - Asset Manager</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container">

    <h2>Assets</h2>

    <a class="btn" sec:authorize="hasAnyRole('ADMIN','MANAGER')" th:href="@{/assets/create}">Add Asset</a>

    <div class="card">

        <form th:action="@{/assets/search}" method="get">

            <label for="keyword">Search</label>
            <input
                    type="text"
                    id="keyword"
                    name="keyword"
                    th:value="${keyword}"
                    placeholder="Search by title">

            <button type="submit">Search</button>

        </form>

    </div>

    <table>

        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Category</th>
            <th>Status</th>
        </tr>

        <tr th:each="asset : ${assets}">

            <td th:text="${asset.assetId}"></td>

            <td>
                <a
                        th:href="@{/assets/{id}(id=${asset.assetId})}"
                        th:text="${asset.title}">
                </a>
            </td>

            <td th:text="${asset.category}"></td>

            <td><span class="badge" th:text="${asset.status}"></span></td>

        </tr>

    </table>

</div>

</body>
</html>
