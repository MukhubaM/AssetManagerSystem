<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="light" data-scheme="azure">
<head>
  <meta charset="UTF-8">
  <title>Edit Asset - Asset Manager</title>
  <script th:src="@{/js/theme.js}"></script>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div id="root">
  <div class="shell">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="mwrap">

      <div th:replace="~{fragments/topbar :: topbar('Edit Asset')}"></div>

      <div class="main">

        <div class="ph">
          <div>
            <div class="pt">Edit Asset</div>
            <div class="ps">Update this item's details or rental rate.</div>
          </div>
        </div>

        <div class="card" style="max-width:520px;">
          <div class="cb" style="padding:20px;">

            <form
                    method="post"
                    enctype="multipart/form-data"
                    th:action="@{/assets/{id}/edit(id=${assetId})}"
                    th:object="${assetRequest}"
                    class="flex" style="flex-direction:column; gap:14px;">

              <div class="fg">
                <label class="fl" for="title">Title</label>
                <input class="fi" id="title" th:field="*{title}" placeholder="Title">
                <span class="txs" style="color:var(--danger);" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
              </div>

              <div class="fr2">
                <div class="fg">
                  <label class="fl" for="category">Category</label>
                  <input class="fi" id="category" th:field="*{category}" placeholder="Category">
                  <span class="txs" style="color:var(--danger);" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></span>
                </div>

                <div class="fg">
                  <label class="fl" for="serialNumber">Serial Number</label>
                  <input class="fi" id="serialNumber" th:field="*{serialNumber}" placeholder="Serial number">
                  <span class="txs" style="color:var(--danger);" th:if="${#fields.hasErrors('serialNumber')}" th:errors="*{serialNumber}"></span>
                </div>
              </div>

              <div class="fg">
                <label class="fl" for="acquisitionDate">Acquisition Date</label>
                <input class="fi" type="date" id="acquisitionDate" th:field="*{acquisitionDate}">
              </div>

              <div class="fr2">
                <div class="fg">
                  <label class="fl" for="cost">Cost (acquisition price)</label>
                  <input class="fi" type="number" step="0.01" id="cost" th:field="*{cost}">
                </div>

                <div class="fg">
                  <label class="fl" for="dailyRate">Daily Rate (rental cost per day)</label>
                  <input class="fi" type="number" step="0.01" id="dailyRate" th:field="*{dailyRate}" placeholder="e.g. 10.00">
                  <span class="txs" style="color:var(--danger);" th:if="${#fields.hasErrors('dailyRate')}" th:errors="*{dailyRate}"></span>
                </div>
              </div>

              <div class="fr2">
                <div class="fg">
                  <label class="fl" for="location">Location</label>
                  <input class="fi" id="location" th:field="*{location}" placeholder="Location">
                </div>

                <div class="fg">
                  <label class="fl" for="condition">Condition</label>
                  <input class="fi" id="condition" th:field="*{condition}" placeholder="Condition">
                </div>
              </div>

              <div class="fg">
                <label class="fl" for="photo">Replace Photo (optional)</label>
                <input class="fi" type="file" id="photo" th:field="*{photo}">
              </div>

              <button type="submit" class="btn btnp" style="justify-content:center;">Save Changes</button>

            </form>

          </div>
        </div>

      </div>

    </div>

  </div>
</div>

</body>
</html>
