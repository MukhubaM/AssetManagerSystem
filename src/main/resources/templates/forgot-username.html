<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="light" data-scheme="azure">
<head>
    <meta charset="UTF-8">
    <title>Forgot Username - Asset Manager</title>
    <script th:src="@{/js/theme.js}"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;">

    <div class="card" style="width:100%; max-width:380px; padding:28px;">

        <div class="flex aic g10 mb16" style="justify-content:center; margin-top:4px;">
            <div class="sb-logo"><span th:replace="~{fragments/icons :: ic-logo}"></span></div>
            <div class="tb-title">ATLAS</div>
        </div>

        <p class="ph mb16" style="justify-content:center; text-align:center;"><span class="pt">Forgot Username</span></p>

        <div th:if="${submitted}">
            <div class="ni">
                <div class="nico nico-g"><span th:replace="~{fragments/icons :: ic-check}"></span></div>
                <div>
                    <div class="ntit">Check your email</div>
                    <div class="nmsg">If the details match an account, we've emailed that account's username (your login email) to it.</div>
                </div>
            </div>
            <a class="btn btnp mt16" th:href="@{/login}" style="justify-content:center; width:100%;">Back to Login</a>
        </div>

        <form th:unless="${submitted}"
              th:action="@{/forgot-username}"
              th:object="${forgotUsernameRequest}"
              method="post"
              class="flex" style="flex-direction:column; gap:14px;">

            <p class="tsm tmute">Your username is your login email. Enter your Member Number and ID Number, we'll email it to you.</p>

            <div class="fg">
                <label class="fl" for="memberNumber">Member Number</label>
                <input class="fi" id="memberNumber" th:field="*{memberNumber}" placeholder="Member number">
                <span class="txs" style="color:var(--danger);" th:if="${#fields.hasErrors('memberNumber')}" th:errors="*{memberNumber}"></span>
            </div>

            <div class="fg">
                <label class="fl" for="idNumber">ID Number</label>
                <input class="fi" id="idNumber" th:field="*{idNumber}" placeholder="ID number">
                <span class="txs" style="color:var(--danger);" th:if="${#fields.hasErrors('idNumber')}" th:errors="*{idNumber}"></span>
            </div>

            <button type="submit" class="btn btnp" style="justify-content:center; padding:9px;">Send Username</button>

        </form>

        <p class="tsm mt16" style="text-align:center;">
            <a th:href="@{/login}">Back to Login</a>
        </p>

    </div>

</div>

</body>
</html>
