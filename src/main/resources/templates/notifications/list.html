<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="light" data-scheme="azure">
<head>
  <meta charset="UTF-8">
  <title>Notifications - Asset Manager</title>
  <script th:src="@{/js/theme.js}"></script>
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div id="root">
  <div class="shell">

    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div class="mwrap">

      <div th:replace="~{fragments/topbar :: topbar('Notifications')}"></div>

      <div class="main">

        <div class="ph">
          <div>
            <div class="pt">Notifications</div>
            <div class="ps">Loan approvals, rejections and reminders.</div>
          </div>
          <form th:action="@{/notifications/read-all}" method="post">
            <button type="submit" class="btn btns">Mark All as Read</button>
          </form>
        </div>

        <div th:each="n : ${notifications}" class="ni" th:classappend="${!n.read} ? 'unread' : ''">

          <div
                  class="nico"
                  th:classappend="${n.type != null and (n.type.name() == 'LOAN_REJECTED' or n.type.name() == 'LOAN_OVERDUE')} ? 'nico-a' : (${n.type != null and (n.type.name() == 'LOAN_APPROVED' or n.type.name() == 'LOAN_CHECKED_OUT' or n.type.name() == 'LOAN_RETURNED' or n.type.name() == 'ACCOUNT')} ? 'nico-g' : 'nico-b')">
            <span th:replace="~{fragments/icons :: ic-notification}"></span>
          </div>

          <div style="flex:1;">
            <div class="ntit" th:text="${n.title}"></div>
            <div class="nmsg" th:text="${n.message}"></div>
            <div class="ntm" th:text="${n.createdAt}"></div>
          </div>

          <form th:unless="${n.read}" th:action="@{/notifications/{id}/read(id=${n.notificationId})}" method="post">
            <button type="submit" class="btn btns bsm">Mark Read</button>
          </form>

        </div>

        <p class="tmute tsm" th:if="${#lists.isEmpty(notifications)}">You have no notifications.</p>

      </div>

    </div>

  </div>
</div>

</body>
</html>
