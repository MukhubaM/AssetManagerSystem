<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="light" data-scheme="azure">
<head>
    <meta charset="UTF-8">
    <title>Audit Log - Asset Manager</title>
    <script th:src="@{/js/theme.js}"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div id="root">
    <div class="shell">

        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <div class="mwrap">

            <div th:replace="~{fragments/topbar :: topbar('Audit Log')}"></div>

            <div class="main">

                <div class="ph">
                    <div>
                        <div class="pt">Audit Log</div>
                        <div class="ps">A record of actions taken across the system.</div>
                    </div>
                </div>

                <div class="card">
                    <div class="cb" style="padding:0;">
                        <table class="tbl">

                            <tr>
                                <th>Time</th>
                                <th>User ID</th>
                                <th>Entity</th>
                                <th>Entity ID</th>
                                <th>Action</th>
                            </tr>

                            <tr th:each="entry : ${logs}">

                                <td th:text="${entry.timestamp}"></td>
                                <td th:text="${entry.userId}"></td>
                                <td th:text="${entry.entityType}"></td>
                                <td th:text="${entry.entityId}"></td>
                                <td th:text="${entry.action}"></td>

                            </tr>

                        </table>

                        <p class="tmute tsm" style="padding:16px;" th:if="${#lists.isEmpty(logs)}">No activity recorded yet.</p>
                    </div>
                </div>

            </div>

        </div>

    </div>
</div>

</body>
</html>
