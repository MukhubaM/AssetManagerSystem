<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Manage Users - Asset Manager</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container">

    <h2>Manage Users</h2>

    <table>

        <tr>
            <th>Name</th>
            <th>  </th>
            <th>Email</th>
            <th>  </th>
            <th>Department</th>
            <th>  </th>
            <th>Role</th>
            <th>  </th>
            <th>Status</th>
            <th>  </th>
            <th>Actions</th>
        </tr>

        <tr th:each="user : ${users}">

            <td th:text="${user.name}"></td>
            <td>  </td>
            <td th:text="${user.email}"></td>
            <td>  </td>
            <td th:text="${user.department}"></td>
            <td>  </td>
            <td><span class="badge" th:text="${user.role}"></span></td>

            <td>
                <span
                        class="badge"
                        th:text="${user.enabled} ? 'ENABLED' : 'DISABLED'">
                </span>
            </td>

            <td>

                <form
                        class="inline-form"
                        th:action="@{/admin/users/{id}/role(id=${user.userId})}"
                        method="post">

                    <select name="role" style="display:inline-block; width:auto; margin:0;">
                        <option
                                th:each="r : ${roles}"
                                th:value="${r}"
                                th:text="${r}"
                                th:selected="${r == user.role}">
                        </option>
                    </select>

                    <button type="submit" style="margin-top:0;">Update Role</button>

                </form>

                <form
                        class="inline-form"
                        th:if="${user.enabled}"
                        th:action="@{/admin/users/{id}/disable(id=${user.userId})}"
                        method="post">

                    <button type="submit" class="danger" style="margin-top:0;">Disable</button>

                </form>

                <form
                        class="inline-form"
                        th:unless="${user.enabled}"
                        th:action="@{/admin/users/{id}/enable(id=${user.userId})}"
                        method="post">

                    <button type="submit" class="secondary" style="margin-top:0;">Enable</button>

                </form>

            </td>

        </tr>

    </table>

</div>

</body>
</html>
