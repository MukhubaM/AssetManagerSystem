<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="light" data-scheme="azure">
<head>
    <meta charset="UTF-8">
    <title>Manage Users - Asset Manager</title>
    <script th:src="@{/js/theme.js}"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div id="root">
    <div class="shell">

        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <div class="mwrap">

            <div th:replace="~{fragments/topbar :: topbar('Manage Users')}"></div>

            <div class="main">

                <div class="ph">
                    <div>
                        <div class="pt">Manage Users</div>
                        <div class="ps">Promote, demote or disable accounts.</div>
                    </div>
                </div>

                <div class="card">
                    <div class="cb" style="padding:0;">
                        <table class="tbl">

                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Department</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>

                            <tr th:each="user : ${users}">

                                <td class="cp" th:text="${user.name}"></td>
                                <td th:text="${user.email}"></td>
                                <td th:text="${user.department}"></td>

                                <td>
                                    <span class="b bb"><span class="bd"></span><span th:text="${user.role}"></span></span>
                                </td>

                                <td>
                                <span
                                        class="b"
                                        th:classappend="${user.enabled} ? 'bg' : 'bs'"
                                        th:text="${user.enabled} ? 'ENABLED' : 'DISABLED'">
                                </span>
                                </td>

                                <td>

                                    <div class="flex g6" style="flex-wrap:wrap;">

                                        <form
                                                class="flex g6"
                                                th:action="@{/admin/users/{id}/role(id=${user.userId})}"
                                                method="post">

                                            <select name="role" class="fs" style="width:auto;">
                                                <option
                                                        th:each="r : ${roles}"
                                                        th:value="${r}"
                                                        th:text="${r}"
                                                        th:selected="${r == user.role}">
                                                </option>
                                            </select>

                                            <button type="submit" class="btn btns bsm">Update Role</button>

                                        </form>

                                        <form
                                                th:if="${user.enabled}"
                                                th:action="@{/admin/users/{id}/disable(id=${user.userId})}"
                                                method="post">
                                            <button type="submit" class="btn btnd bsm">Disable</button>
                                        </form>

                                        <form
                                                th:unless="${user.enabled}"
                                                th:action="@{/admin/users/{id}/enable(id=${user.userId})}"
                                                method="post">
                                            <button type="submit" class="btn btns bsm">Enable</button>
                                        </form>

                                    </div>

                                </td>

                            </tr>

                        </table>
                    </div>
                </div>

            </div>

        </div>

    </div>
</div>

</body>
</html>
