<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="light" data-scheme="azure">
<head>
    <meta charset="UTF-8">
    <title>Inventory Report - Asset Manager</title>
    <script th:src="@{/js/theme.js}"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div id="root">
    <div class="shell">

        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <div class="mwrap">

            <div th:replace="~{fragments/topbar :: topbar('Inventory Report')}"></div>

            <div class="main">

                <div class="ph">
                    <div>
                        <div class="pt">Inventory Report</div>
                        <div class="ps">Every asset in the system.</div>
                    </div>
                </div>

                <div class="card">
                    <div class="cb" style="padding:0;">
                        <table class="tbl">

                            <tr>
                                <th>Title</th>
                                <th>Category</th>
                                <th>Location</th>
                                <th>Status</th>
                            </tr>

                            <tr th:each="asset : ${assets}">

                                <td class="cp" th:text="${asset.title}"></td>
                                <td th:text="${asset.category}"></td>
                                <td th:text="${asset.location}"></td>
                                <td>
                                <span
                                        class="b"
                                        th:classappend="${asset.status.name() == 'AVAILABLE'} ? 'bg' : (${asset.status.name() == 'LOANED'} ? 'bb' : 'bs')">
                                    <span class="bd"></span>
                                    <span th:text="${asset.status}"></span>
                                </span>
                                </td>

                            </tr>

                        </table>
                    </div>
                </div>

            </div>

        </div>

    </div>
</div>

</body>
</html>
