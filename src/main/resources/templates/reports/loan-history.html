<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Loan History - Asset Manager</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container">

    <h2>Loan History</h2>

    <table>

        <tr>
            <th>Borrower</th>
            <th>Asset</th>
            <th>Requested</th>
            <th>Checked Out</th>
            <th>Returned</th>
            <th>Status</th>
        </tr>

        <tr th:each="loan : ${loans}">

            <td th:text="${loan.borrower.name}"></td>
            <td th:text="${loan.asset.title}"></td>
            <td th:text="${loan.requestDate}"></td>
            <td th:text="${loan.checkoutDate}"></td>
            <td th:text="${loan.returnDate}"></td>
            <td><span class="badge" th:text="${loan.status}"></span></td>

        </tr>

    </table>

</div>

</body>
</html>
