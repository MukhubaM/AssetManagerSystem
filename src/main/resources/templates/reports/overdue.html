<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="light" data-scheme="azure">
<head>
    <meta charset="UTF-8">
    <title>Overdue Loans - Asset Manager</title>
    <script th:src="@{/js/theme.js}"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div id="root">
    <div class="shell">

        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <div class="mwrap">

            <div th:replace="~{fragments/topbar :: topbar('Overdue Loans')}"></div>

            <div class="main">

                <div class="ph">
                    <div>
                        <div class="pt">Overdue Loans</div>
                        <div class="ps">Loans past their due date.</div>
                    </div>
                </div>

                <div class="card">
                    <div class="cb" style="padding:0;">
                        <table class="tbl">

                            <tr>
                                <th>Borrower</th>
                                <th>Asset</th>
                                <th>Due Date</th>
                            </tr>

                            <tr th:each="loan : ${loans}">

                                <td th:text="${loan.borrower.name}"></td>
                                <td class="cp" th:text="${loan.asset.title}"></td>
                                <td th:text="${loan.dueDate}"></td>

                            </tr>

                        </table>

                        <p class="tmute tsm" style="padding:16px;" th:if="${#lists.isEmpty(loans)}">No overdue loans. 🎉🎉🎉</p>
                    </div>
                </div>

            </div>

        </div>

    </div>
</div>

</body>
</html>
