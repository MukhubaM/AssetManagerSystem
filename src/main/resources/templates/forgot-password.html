<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="light" data-scheme="azure">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - Asset Manager</title>
    <script th:src="@{/js/theme.js}"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;">

    <div class="card" style="width:100%; max-width:380px; padding:28px;">

        <div class="flex aic g10 mb16">
            <div class="sb-logo"><span th:replace="~{fragments/icons :: ic-logo}"></span></div>
            <div class="tb-title">ATLAS</div>
        </div>

        <p class="ph"><span class="pt">Forgot Password</span></p>

        <div th:if="${submitted}">
            <div class="ni">
                <div class="nico nico-g"><span th:replace="~{fragments/icons :: ic-check}"></span></div>
                <div>
                    <div class="ntit">Check your email</div>
                    <div class="nmsg">If the email is registered, we've sent a password reset link. It expires in 30 minutes.</div>
                </div>
            </div>
            <a class="btn btnp mt16" th:href="@{/login}" style="justify-content:center; width:100%;">Back to Login</a>
        </div>

        <form th:unless="${submitted}"
              th:action="@{/forgot-password}"
              th:object="${forgotPasswordRequest}"
              method="post"
              class="flex" style="flex-direction:column; gap:14px;">

            <p class="tsm tmute">Enter the email on your account and we'll send you a reset link.</p>

            <div class="fg">
                <label class="fl" for="email">Email</label>
                <input class="fi" id="email" th:field="*{email}" placeholder="Email">
                <span class="txs" style="color:var(--danger);" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
            </div>

            <button type="submit" class="btn btnp" style="justify-content:center; padding:9px;">Send Reset Link</button>

        </form>

        <p class="tsm mt16" style="text-align:center;">
            <a th:href="@{/login}">Back to Login</a>
        </p>

    </div>

</div>

</body>
</html>
