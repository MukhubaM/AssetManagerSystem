<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Forgot Password - Asset Manager</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="container" style="max-width: 380px;">

    <div class="card">

        <h2>Forgot Password</h2>

        <div th:if="${submitted}">
            <p style="color:#16a34a;">
                If that email is registered, we've sent a password reset link to it.
                The link expires in 30 minutes.
            </p>
            <a class="btn" th:href="@{/login}">Back to Login</a>
        </div>

        <form th:unless="${submitted}"
              th:action="@{/forgot-password}"
              th:object="${forgotPasswordRequest}"
              method="post">

            <p style="color:#52606d; font-size:0.9rem;">
                Enter the email address on your account, we'll send you a link to reset your password.
            </p>

            <label for="email">Email</label>
            <input id="email" th:field="*{email}" placeholder="Email">
            <span class="error-text" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>

            <button type="submit">Send Reset Link</button>

        </form>

        <p style="margin-top: 1rem;">
            <a th:href="@{/login}">Back to login-page</a>
        </p>

    </div>

</div>

</body>
</html>
