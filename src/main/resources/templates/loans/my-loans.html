<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="light" data-scheme="azure">
<head>
    <meta charset="UTF-8">
    <title>My Loans - Asset Manager</title>
    <script th:src="@{/js/theme.js}"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div id="root">
    <div class="shell">

        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <div class="mwrap">

            <div th:replace="~{fragments/topbar :: topbar('My Loans')}"></div>

            <div class="main">

                <div class="ph">
                    <div>
                        <div class="pt">My Loans</div>
                        <div class="ps">Everything you've requested or borrowed.</div>
                    </div>
                </div>

                <div class="card">
                    <div class="cb" style="padding:0;">
                        <table class="tbl">

                            <tr>
                                <th>Asset</th>
                                <th>Requested</th>
                                <th>Duration</th>
                                <th>Cost</th>
                                <th>Due</th>
                                <th>Status</th>
                                <th>Payment</th>
                                <th>Actions</th>
                            </tr>

                            <tr th:each="loan : ${loans}">

                                <td class="cp" th:text="${loan.asset.title}"></td>

                                <td th:text="${loan.requestDate}"></td>

                                <td th:text="${loan.durationDays} + ' day(s)'"></td>

                                <td th:text="${loan.totalCost}"></td>

                                <td th:text="${loan.dueDate}"></td>

                                <td>
                                <span
                                        class="b"
                                        th:classappend="${loan.status.name() == 'PENDING'} ? 'ba' : (${loan.status.name() == 'REJECTED' or loan.status.name() == 'OVERDUE'} ? 'br' : (${loan.status.name() == 'RETURNED'} ? 'bs' : 'bb'))">
                                    <span class="bd"></span>
                                    <span th:text="${loan.status}"></span>
                                </span>
                                </td>

                                <td>
                                <span
                                        th:if="${loan.payment != null}"
                                        class="b"
                                        th:classappend="${loan.payment.status.name() == 'COMPLETED'} ? 'bg' : 'ba'">
                                    <span class="bd"></span>
                                    <span th:text="${loan.payment.status}"></span>
                                </span>
                                    <span th:if="${loan.payment == null and loan.status.name() == 'APPROVED'}" class="b br">
                                    <span class="bd"></span> Not paid
                                </span>
                                </td>

                                <td>

                                    <form
                                            th:if="${loan.status.name() == 'APPROVED' and loan.payment == null}"
                                            th:action="@{/payments/initiate/{id}(id=${loan.loanId})}"
                                            method="post">
                                        <button type="submit" class="btn btnp bsm">Pay Now</button>
                                    </form>

                                    <a
                                            th:if="${loan.payment != null and loan.payment.status.name() == 'PENDING'}"
                                            class="btn btnp bsm"
                                            th:href="@{/payments/{id}(id=${loan.payment.paymentId})}">
                                        Complete Payment
                                    </a>

                                    <form
                                            th:if="${loan.status.name() == 'CHECKED_OUT' or loan.status.name() == 'OVERDUE'}"
                                            th:action="@{/loans/return/{id}(id=${loan.loanId})}"
                                            method="post">
                                        <button class="btn btns bsm">Return</button>
                                    </form>

                                </td>

                            </tr>

                        </table>

                        <p class="tmute tsm" style="padding:16px;" th:if="${#lists.isEmpty(loans)}">
                            You have no loan requests yet.
                        </p>
                    </div>
                </div>

            </div>

        </div>

    </div>
</div>

</body>
</html>
