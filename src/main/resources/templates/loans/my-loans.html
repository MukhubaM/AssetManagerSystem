<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Loans - Asset Manager</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container">

    <h2>My Loans</h2>

    <table>

        <tr>
            <th>Asset</th>
            <th>Requested</th>
            <th>Duration</th>
            <th>Cost</th>
            <th>Due</th>
            <th>Status</th>
            <th>Payment</th>
            <th>Actions</th>
        </tr>

        <tr th:each="loan : ${loans}">

            <td th:text="${loan.asset.title}"></td>

            <td th:text="${loan.requestDate}"></td>

            <td th:text="${loan.durationDays} + ' day(s)'"></td>

            <td th:text="${loan.totalCost}"></td>

            <td th:text="${loan.dueDate}"></td>

            <td><span class="badge" th:text="${loan.status}"></span></td>

            <td>
                <span
                        th:if="${loan.payment != null}"
                        class="badge"
                        th:text="${loan.payment.status}">
                </span>
                <span th:if="${loan.payment == null and loan.status.name() == 'APPROVED'}" style="color:#dc2626;">
                    Not paid
                </span>
            </td>

            <td>

                <form
                        th:if="${loan.status.name() == 'APPROVED' and loan.payment == null}"
                        th:action="@{/payments/initiate/{id}(id=${loan.loanId})}"
                        method="post">

                    <button type="submit">Pay Now</button>

                </form>

                <a
                        th:if="${loan.payment != null and loan.payment.status.name() == 'PENDING'}"
                        class="btn"
                        th:href="@{/payments/{id}(id=${loan.payment.paymentId})}">
                    Complete Payment
                </a>

                <form
                        th:if="${loan.status.name() == 'CHECKED_OUT' or loan.status.name() == 'OVERDUE'}"
                        th:action="@{/loans/return/{id}(id=${loan.loanId})}"
                        method="post">

                    <button class="secondary">Return</button>

                </form>
            </td>

        </tr>

    </table>

    <p th:if="${#lists.isEmpty(loans)}">You have no loan requests yet.</p>

</div>

</body>
</html>
