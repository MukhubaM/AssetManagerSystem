<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="light" data-scheme="azure">
<head>
    <meta charset="UTF-8">
    <title>Loan Requests - Asset Manager</title>
    <script th:src="@{/js/theme.js}"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div id="root">
    <div class="shell">

        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <div class="mwrap">

            <div th:replace="~{fragments/topbar :: topbar('Loan Requests')}"></div>

            <div class="main">

                <div class="ph">
                    <div>
                        <div class="pt">Loan Requests</div>
                        <div class="ps">Approve, reject and manage loans across the system.</div>
                    </div>
                </div>

                <div class="card">
                    <div class="cb" style="padding:0;">
                        <table class="tbl">

                            <tr>
                                <th>ID</th>
                                <th>Asset</th>
                                <th>Borrower</th>
                                <th>Duration</th>
                                <th>Cost</th>
                                <th>Status</th>
                                <th>Payment</th>
                                <th>Actions</th>
                            </tr>

                            <tr th:each="loan : ${loans}">

                                <td th:text="${loan.loanId}"></td>

                                <td class="cp" th:text="${loan.asset.title}"></td>

                                <td th:text="${loan.borrower.name}"></td>

                                <td th:text="${loan.durationDays} + ' day(s)'"></td>

                                <td th:text="${loan.totalCost}"></td>

                                <td>
                                <span
                                        class="b"
                                        th:classappend="${loan.status.name() == 'PENDING'} ? 'ba' : (${loan.status.name() == 'REJECTED' or loan.status.name() == 'OVERDUE'} ? 'br' : (${loan.status.name() == 'RETURNED'} ? 'bs' : 'bb'))">
                                    <span class="bd"></span>
                                    <span th:text="${loan.status}"></span>
                                </span>
                                </td>

                                <td>
                                <span
                                        th:if="${loan.payment != null}"
                                        class="b"
                                        th:classappend="${loan.payment.status.name() == 'COMPLETED'} ? 'bg' : 'ba'">
                                    <span class="bd"></span>
                                    <span th:text="${loan.payment.status}"></span>
                                </span>
                                    <span th:if="${loan.payment == null and loan.status.name() == 'APPROVED'}" class="b br">
                                    <span class="bd"></span> Not paid
                                </span>
                                </td>

                                <td>

                                    <div class="flex g6" style="flex-wrap:wrap;">

                                        <form
                                                th:if="${loan.status.name() == 'PENDING'}"
                                                th:action="@{/loans/approve/{id}(id=${loan.loanId})}"
                                                method="post">
                                            <button class="btn btnp bsm">Approve</button>
                                        </form>

                                        <form
                                                th:if="${loan.status.name() == 'PENDING'}"
                                                th:action="@{/loans/reject/{id}(id=${loan.loanId})}"
                                                method="post">
                                            <button class="btn btnd bsm">Reject</button>
                                        </form>

                                        <form
                                                th:if="${loan.status.name() == 'APPROVED' and loan.payment != null and loan.payment.status.name() == 'COMPLETED'}"
                                                th:action="@{/loans/checkout/{id}(id=${loan.loanId})}"
                                                method="post">
                                            <button class="btn btnp bsm">Check Out</button>
                                        </form>

                                        <span
                                                th:if="${loan.status.name() == 'APPROVED' and (loan.payment == null or loan.payment.status.name() != 'COMPLETED')}"
                                                class="txs tmute">
                                        Awaiting payment
                                    </span>

                                        <form
                                                th:if="${loan.status.name() == 'APPROVED' and loan.payment != null}"
                                                th:action="@{/payments/{id}/rollback(id=${loan.payment.paymentId})}"
                                                method="post"
                                                data-confirm="Roll back this payment? This deletes the transaction record.">
                                            <button class="btn btnd bsm">Rollback Payment</button>
                                        </form>

                                        <form
                                                th:if="${loan.status.name() == 'CHECKED_OUT' or loan.status.name() == 'OVERDUE'}"
                                                th:action="@{/loans/return/{id}(id=${loan.loanId})}"
                                                method="post">
                                            <button class="btn btns bsm">Return</button>
                                        </form>

                                    </div>

                                </td>

                            </tr>

                        </table>

                        <p class="tmute tsm" style="padding:16px;" th:if="${#lists.isEmpty(loans)}">No loan requests yet.</p>
                    </div>
                </div>

            </div>

        </div>

    </div>
</div>

</body>
</html>
