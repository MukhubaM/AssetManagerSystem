<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Loan Requests - Asset Manager</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container">

    <h2>Loan Requests</h2>

    <table>

        <tr>
            <th>ID</th>
            <th>Asset</th>
            <th>Borrower</th>
            <th>Duration</th>
            <th>Cost</th>
            <th>Status</th>
            <th>Payment</th>
            <th>Actions</th>
        </tr>

        <tr th:each="loan : ${loans}">

            <td th:text="${loan.loanId}"></td>

            <td th:text="${loan.asset.title}"></td>

            <td th:text="${loan.borrower.name}"></td>

            <td th:text="${loan.durationDays} + ' day(s)'"></td>

            <td th:text="${loan.totalCost}"></td>

            <td><span class="badge" th:text="${loan.status}"></span></td>

            <td>
                <span
                        th:if="${loan.payment != null}"
                        class="badge"
                        th:text="${loan.payment.status}">
                </span>
                <span th:if="${loan.payment == null and loan.status.name() == 'APPROVED'}" style="color:#dc2626;">
                    Not paid
                </span>
            </td>

            <td>

                <form
                        class="inline-form"
                        th:if="${loan.status.name() == 'PENDING'}"
                        th:action="@{/loans/approve/{id}(id=${loan.loanId})}"
                        method="post">

                    <button>Approve</button>

                </form>

                <form
                        class="inline-form"
                        th:if="${loan.status.name() == 'PENDING'}"
                        th:action="@{/loans/reject/{id}(id=${loan.loanId})}"
                        method="post">

                    <button class="danger">Reject</button>

                </form>

                <form
                        class="inline-form"
                        th:if="${loan.status.name() == 'APPROVED' and loan.payment != null and loan.payment.status.name() == 'COMPLETED'}"
                        th:action="@{/loans/checkout/{id}(id=${loan.loanId})}"
                        method="post">

                    <button>Check Out</button>

                </form>

                <span
                        th:if="${loan.status.name() == 'APPROVED' and (loan.payment == null or loan.payment.status.name() != 'COMPLETED')}"
                        style="font-size:0.8rem; color:#52606d;">
                    Awaiting payment
                </span>

                <form
                        class="inline-form"
                        th:if="${loan.status.name() == 'APPROVED' and loan.payment != null}"
                        th:action="@{/payments/{id}/rollback(id=${loan.payment.paymentId})}"
                        method="post">

                    <button class="danger">Rollback Payment</button>

                </form>

                <form
                        class="inline-form"
                        th:if="${loan.status.name() == 'CHECKED_OUT' or loan.status.name() == 'OVERDUE'}"
                        th:action="@{/loans/return/{id}(id=${loan.loanId})}"
                        method="post">

                    <button class="secondary">Return</button>

                </form>

            </td>

        </tr>

    </table>

</div>

</body>
</html>
