<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - Asset Manager</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="container" style="max-width: 380px;">

    <div class="card">

        <h2>Reset Password</h2>

        <form
                th:action="@{/reset-password}"
                th:object="${resetPasswordRequest}"
                method="post">

            <input type="hidden" th:field="*{token}">

            <label for="newPassword">New Password</label>
            <input type="password" id="newPassword" th:field="*{newPassword}" placeholder="New password">
            <span class="error-text" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></span>

            <label for="confirmPassword">Confirm New Password</label>
            <input type="password" id="confirmPassword" th:field="*{confirmPassword}" placeholder="Confirm new password">

            <span
                    class="error-text"
                    th:if="${#fields.hasErrors('passwordConfirmed')}"
                    th:errors="*{passwordConfirmed}">
            </span>

            <button type="submit">Reset Password</button>

        </form>

    </div>

</div>

</body>
</html>
