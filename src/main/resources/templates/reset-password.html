<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" data-theme="light" data-scheme="azure">
<head>
    <meta charset="UTF-8">
    <title>Reset Password - Asset Manager</title>
    <script th:src="@{/js/theme.js}"></script>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;">

    <div class="card" style="width:100%; max-width:380px; padding:28px;">

        <div class="flex aic g10 mb16">
            <div class="sb-logo"><span th:replace="~{fragments/icons :: ic-logo}"></span></div>
            <div class="tb-title">ATLAS</div>
        </div>

        <p class="ph"><span class="pt">Reset Password</span></p>

        <form
                th:action="@{/reset-password}"
                th:object="${resetPasswordRequest}"
                method="post"
                class="flex" style="flex-direction:column; gap:14px;">

            <input type="hidden" th:field="*{token}">

            <div class="fg">
                <label class="fl" for="newPassword">New Password</label>
                <input class="fi" type="password" id="newPassword" th:field="*{newPassword}" placeholder="New password">
                <span class="txs" style="color:var(--danger);" th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"></span>
            </div>

            <div class="fg">
                <label class="fl" for="confirmPassword">Confirm New Password</label>
                <input class="fi" type="password" id="confirmPassword" th:field="*{confirmPassword}" placeholder="Confirm new password">
                <span
                        class="txs" style="color:var(--danger);"
                        th:if="${#fields.hasErrors('passwordConfirmed')}"
                        th:errors="*{passwordConfirmed}">
                </span>
            </div>

            <button type="submit" class="btn btnp" style="justify-content:center; padding:9px;">Reset Password</button>

        </form>

    </div>

</div>

</body>
</html>
