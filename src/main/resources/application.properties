spring.application.name=AssetManagementSystem

server.port=8080

# --- Datasource ---
# Override via environment variables in production:
# DB_URL, DB_USERNAME, DB_PASSWORD
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/assetdb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# --- Thymeleaf ---
spring.thymeleaf.cache=false

# --- File uploads ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
upload.directory=uploads

# --- Email (used by password reset, username recovery, notifications) ---
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

app.mail.from=${MAIL_FROM:no-reply@assetmanager.local}
# Used to build absolute links in emails (the password reset link)
app.base-url=${APP_BASE_URL:http://localhost:8080}

# --- Bootstrap admin ---
# Created automatically on first startup ONLY if no ADMIN account exists
app.admin.name=System Administrator
app.admin.department=IT
app.admin.email=${ADMIN_EMAIL:admin@example.com}
app.admin.password=${ADMIN_PASSWORD:ChangeMe123!}

# --- Logging ---
logging.level.org.springframework.security=INFO
logging.level.com.assetmanager.AssetManagementSystem=DEBUG