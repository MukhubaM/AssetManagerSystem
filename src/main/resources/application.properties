spring.application.name=AssetManagementSystem

server.port=8080

# --- Datasource ---
# Override via environment variables in production:
# DB_URL, DB_USERNAME, DB_PASSWORD
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/assetdb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Every association actually rendered in a template (Loan.asset, Loan.borrower,
# Loan.payment, Payment.loan) is EAGER, specifically so it's safe to keep the
# persistence context closed before the view renders. If you add a new field to a
# template that follows an association, either make that association EAGER too or
# fetch it explicitly in the service/repository layer - otherwise Thymeleaf will hit
# a LazyInitializationException that surfaces as a generic "template parsing" error.
spring.jpa.open-in-view=false

# --- Thymeleaf ---
spring.thymeleaf.cache=false

# --- File uploads ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
upload.directory=uploads

# --- Email (used by password reset, username recovery, notifications) ---
# Optional in dev: if left unconfigured, EmailService logs the email content
# instead of failing the request (see EmailServiceImpl).
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

app.mail.from=${MAIL_FROM:no-reply@assetmanager.local}
# Used to build absolute links in emails (e.g. the password reset link)
app.base-url=${APP_BASE_URL:http://localhost:8080}

# --- Bootstrap admin ---
# Created automatically on first startup ONLY if no ADMIN account exists yet
# (public registration can never create one). Override before first boot in
# production; change the password immediately after logging in either way.
app.admin.name=System Administrator
app.admin.department=IT
app.admin.email=${ADMIN_EMAIL:admin@example.com}
app.admin.password=${ADMIN_PASSWORD:ChangeMe123!}

# --- Logging ---
logging.level.org.springframework.security=INFO
logging.level.com.assetmanager.AssetManagementSystem=DEBUG