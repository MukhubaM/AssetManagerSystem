spring.application.name=AssetManagementSystem

server.port=8080

# --- Datasource ---
# Override via environment variables in production:
# DB_URL, DB_USERNAME, DB_PASSWORD
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/assetdb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Associations used in templates (Loan.asset, Loan.borrower) are @ManyToOne and EAGER by
# default, so it is safe to keep the persistence context closed before the view renders.
spring.jpa.open-in-view=false

# --- Thymeleaf ---
spring.thymeleaf.cache=false

# --- File uploads ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
upload.directory=uploads

# --- Logging ---
logging.level.org.springframework.security=INFO
logging.level.com.assetmanager.AssetManagementSystem=DEBUG
